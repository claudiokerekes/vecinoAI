name: Deploy VecinoAI → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Compilar Tailwind CSS
        run: |
          npm ci
          npm run build:css
          echo "✅ Tailwind compilado → $(wc -c < assets/css/tailwind.css) bytes"

      - name: Inyectar secrets
        run: |
          sed -i "s|__WEB3FORMS_KEY__|${{ secrets.WEB3FORMS_KEY }}|g" demo/index.html
          echo "✅ WEB3FORMS_KEY inyectada"

          if [ -n "${{ secrets.FACEBOOK_PIXEL_ID }}" ]; then
            sed -i "s|__FACEBOOK_PIXEL_ID__|${{ secrets.FACEBOOK_PIXEL_ID }}|g" assets/js/shared.js
            echo "✅ FACEBOOK_PIXEL_ID inyectada"
          else
            echo "⬜ FACEBOOK_PIXEL_ID no configurada aún — se omite"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
