<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width:1200px; height:630px; overflow:hidden;
      background:#080814; font-family:'Inter',system-ui,sans-serif;
      display:flex; align-items:center; justify-content:center;
      border: 1px solid rgba(99,102,241,0.25);
      position:relative;
    }
    body::before {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,0.35) 0%, transparent 65%);
    }
  </style>
</head>
<body>
  <!-- contenido centrado -->
  <div style="position:relative;z-index:1;text-align:center;padding:0 80px;width:100%">
    <!-- badge -->
    <div style="display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:9999px;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;font-size:16px;font-weight:600;margin-bottom:32px;">
      IA para Administración de Propiedades
    </div>

    <!-- título con gradient en "IA" -->
    <div style="font-size:72px;font-weight:900;color:#ffffff;line-height:1.05;tracking-tight;margin-bottom:28px;">
      El asistente de <span style="background:linear-gradient(135deg,#a5b4fc,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">IA</span><br>
      para tu comunidad
    </div>

    <!-- subtítulo -->
    <div style="font-size:22px;color:#94a3b8;font-weight:400;letter-spacing:0.01em;">
      Automatiza solicitudes &nbsp;·&nbsp; Reservas por WhatsApp &nbsp;·&nbsp; IA contextual
    </div>
  </div>

  <!-- logo abajo izquierda -->
  <div style="position:absolute;bottom:40px;left:48px;display:flex;align-items:center;gap:14px">
    <div style="width:48px;height:48px;border-radius:12px;background:#6366f1;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <span style="font-size:24px;font-weight:700;color:#ffffff;">VecinoAI</span>
  </div>

  <!-- url abajo derecha -->
  <div style="position:absolute;bottom:44px;right:48px;font-size:18px;color:#6366f1;font-weight:500;">vecinoai.co</div>
</body>
</html>
